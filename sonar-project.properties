sonar.projectKey=sukantverma
sonar.projectName=Doc_Reader
sonar.sourceEncoding=UTF-8

# Main Python application code
sonar.sources=main.py,config,routers,services,util

# Generated, uploaded, and local environment content should not be scanned
sonar.exclusions=.venv/**,__pycache__/**,storage/**,uploads/**,.scannerwork/**,**/*.pyc

# Keep Python analysis precise for this repo
sonar.python.version=3.13

# Optional coverage import. This becomes active once you generate coverage.xml.
sonar.python.coverage.reportPaths=coverage.xml
